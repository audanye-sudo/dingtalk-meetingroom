<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1E3A5F" />
  <title>会议室申请</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#F4F6F9; --surface:#fff; --ink:#0F172A; --ink2:#475569; --muted:#94A3B8;
      --line:#E6E9EE; --brand:#1E3A5F; --brand2:#274C7A;
      --ok:#0F9D6B; --ok-bg:#E7F6EF; --busy:#B42318; --busy-bg:#FCECEA;
      --radius:16px; --shadow:0 1px 2px rgba(16,24,40,.04),0 6px 18px rgba(16,24,40,.06);
      --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0}
    body{font-family:"Inter",-apple-system,system-ui,"PingFang SC",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
    .tnum{font-variant-numeric:tabular-nums}
    /* header */
    header{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:calc(12px + var(--safe-t)) 16px 12px;background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line)}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .brand .mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto}
    header h1{font-size:16px;font-weight:600;margin:0;letter-spacing:.2px}
    .who{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink2);max-width:46vw}
    .who .avatar{width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex:0 0 auto}
    .who .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    /* layout */
    .wrap{max-width:720px;margin:0 auto;padding:16px 14px calc(28px + var(--safe-b))}
    .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .field{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:0 12px;height:44px;box-shadow:var(--shadow)}
    .field svg{color:var(--muted);flex:0 0 auto}
    .field input[type=date]{border:0;outline:0;background:transparent;font:inherit;color:var(--ink);width:100%;height:100%}
    .btn{appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--ink);font:inherit;font-weight:500;
      height:44px;padding:0 16px;border-radius:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:transform .12s ease,background .15s,border-color .15s,opacity .15s}
    .btn:active{transform:scale(.97)}
    .btn:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
    .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
    .btn.primary:hover{background:var(--brand2)}
    .btn.danger{color:var(--busy);border-color:#F3C7C2;background:#fff}
    .btn.danger:hover{background:var(--busy-bg)}
    .btn.ghost{background:transparent;border-color:var(--line);color:var(--ink2)}
    .btn[disabled]{opacity:.45;cursor:not-allowed}
    .btn.sm{height:38px;padding:0 12px;font-size:13px;flex:1}
    /* grid */
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    @media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr)}}
    .room{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:10px;box-shadow:var(--shadow);overflow:hidden}
    .room::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ok)}
    .room:has(.tag.busy)::before{background:var(--busy)}
    .room .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .room .idn{display:flex;align-items:center;gap:10px;min-width:0}
    .code{width:38px;height:38px;border-radius:10px;background:#EEF2F8;color:var(--brand);font-weight:700;font-size:17px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
    .name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .tag{font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;flex:0 0 auto}
    .tag::before{content:"";width:6px;height:6px;border-radius:50%}
    .tag.free{color:var(--ok);background:var(--ok-bg)} .tag.free::before{background:var(--ok)}
    .tag.busy{color:var(--busy);background:var(--busy-bg)} .tag.busy::before{background:var(--busy)}
    .by{font-size:12.5px;color:var(--ink2);min-height:18px;display:flex;align-items:center}
    .by.empty{color:var(--muted)}
    .row{display:flex;gap:8px;margin-top:2px}
    .center{grid-column:1/-1;text-align:center;padding:56px 16px;color:var(--muted);font-size:14px}
    /* login */
    .login{min-height:calc(100dvh - 110px);display:flex;align-items:center;justify-content:center;padding:24px}
    .login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:34px 26px;text-align:center}
    .login-badge{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;color:#fff;margin:0 auto 18px}
    .login-card h2{margin:0 0 6px;font-size:20px;font-weight:700}
    .login-card p{margin:0 0 24px;color:var(--ink2);font-size:14px}
    .login-card .btn{width:100%}
    /* sheet */
    .mask{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:flex-end;justify-content:center;z-index:10;opacity:0;transition:opacity .2s}
    .mask.show{display:flex;opacity:1}
    .sheet{background:var(--surface);width:100%;max-width:560px;border-radius:20px 20px 0 0;padding:8px 20px calc(24px + var(--safe-b));transform:translateY(14px);transition:transform .25s cubic-bezier(.2,.8,.2,1)}
    .mask.show .sheet{transform:translateY(0)}
    .grip{width:40px;height:4px;border-radius:2px;background:var(--line);margin:8px auto 16px}
    .sheet h3{margin:0 0 14px;font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
    .kv{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);font-size:14px}
    .kv:last-of-type{border-bottom:0}
    .kv .k{color:var(--muted)} .kv .v{color:var(--ink);font-weight:500}
    /* toast */
    .toast{position:fixed;left:50%;bottom:calc(40px + var(--safe-b));transform:translateX(-50%) translateY(8px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;font-weight:500;z-index:20;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2);max-width:80vw;text-align:center}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(prefers-reduced-motion:reduce){*{transition:none!important}}
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="mark"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg></span>
      <h1>会议室申请</h1>
    </div>
    <span class="who" id="who"></span>
  </header>
  <div id="app"><div class="wrap"><div class="grid"><div class="center">加载中…</div></div></div></div>

  <div class="mask" id="mask"><div class="sheet" id="sheet"></div></div>
  <div class="toast" id="toast"></div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://cmssmznuyisllmzdpaes.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtc3Ntem51eWlzbGxtemRwYWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTAwMTIsImV4cCI6MjA5Nzg2NjAxMn0.g0ypNwCWDWvau61XNGMXmoiOJjSVSuhdk3saz6bRxxQ";
    const FN_BASE = SUPABASE_URL.replace(".supabase.co", ".functions.supabase.co");
    const FUNCTION_URL = `${FN_BASE}/rooms-api`;
    const AUTH_FN_URL = `${FN_BASE}/auth-login`;
    const DING_APP_KEY = "dingoaxdvbunwaehabzdht";            // 三方个人应用 appKey
    const REDIRECT_URI = location.origin + location.pathname; // 须在钉钉登录回调白名单内

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const $ = (id) => document.getElementById(id);
    const todayStr = () => new Date().toISOString().slice(0, 10);
    let curDate = todayStr();

    function toast(msg) {
      const t = $("toast"); t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 1800);
    }

    async function callFn(method, opts = {}) {
      const { data: { session } } = await sb.auth.getSession();
      const qs = opts.query ? "?" + new URLSearchParams(opts.query) : "";
      const res = await fetch(FUNCTION_URL + qs, {
        method,
        headers: { "Authorization": `Bearer ${session.access_token}`, "content-type": "application/json" },
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      return res.json();
    }

    async function render() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        $("who").innerHTML = "";
        $("app").innerHTML = `
          <div class="login">
            <div class="login-card">
              <div class="login-badge"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4M9 14h6"/></svg></div>
              <h2>会议室申请</h2>
              <p>登录后查看空闲会议室并发起预订</p>
              <button class="btn primary" id="login">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 5.7 2 10.3c0 2.6 1.5 4.9 3.8 6.4-.2.7-.7 2.3-.8 2.7 0 .2.1.4.4.2.2-.1 2.6-1.7 3.3-2.2.7.1 1.5.2 2.3.2 5.5 0 10-3.7 10-8.3S17.5 2 12 2z"/></svg>
                用钉钉登录
              </button>
            </div>
          </div>`;
        $("login").onclick = () => {
          const state = Math.random().toString(36).slice(2);
          location.href = `https://login.dingtalk.com/oauth2/auth?client_id=${DING_APP_KEY}`
            + `&response_type=code&scope=openid&prompt=consent&state=${state}`
            + `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
        };
        return;
      }
      const nm = session.user.user_metadata?.name ?? "已登录";
      $("who").innerHTML = `<span class="avatar">${nm.slice(0,1)}</span><span class="nm">${nm}</span>`;
      $("app").innerHTML = `
        <div class="wrap">
          <div class="toolbar">
            <div class="field">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
              <input type="date" id="date" class="tnum" value="${curDate}" min="${todayStr()}" />
            </div>
            <button class="btn ghost" id="logout">退出</button>
          </div>
          <div class="grid" id="grid"><div class="center">加载中…</div></div>
        </div>`;
      $("date").onchange = (e) => { curDate = e.target.value || todayStr(); loadRooms(); };
      $("logout").onclick = async () => { await sb.auth.signOut(); render(); };
      loadRooms();
    }

    async function loadRooms() {
      const r = await callFn("GET", { query: { action: "list", date: curDate } });
      if (r.error) { $("grid").innerHTML = `<div class="center">${r.error}</div>`; return; }
      $("grid").innerHTML = r.rooms.map((room) => `
        <div class="room" data-id="${room.id}">
          <div class="top">
            <div class="idn">
              <div class="code">${room.code}</div>
              <div class="name">${room.name}</div>
            </div>
            <span class="tag ${room.booked ? "busy" : "free"}">${room.booked ? "已订" : "空闲"}</span>
          </div>
          <div class="by ${room.booked ? "" : "empty"}">${room.booked ? "预订人 · " + (room.booked_by ?? "—") : "当天可预订"}</div>
          <div class="row">
            <button class="btn sm detail" data-id="${room.id}">详情</button>
            ${
              room.booked
                ? (room.is_mine
                    ? `<button class="btn sm danger cancel" data-bid="${room.booking_id}">取消</button>`
                    : `<button class="btn sm" disabled>不可订</button>`)
                : `<button class="btn sm primary book" data-id="${room.id}">预定</button>`
            }
          </div>
        </div>`).join("");

      $("grid").querySelectorAll(".book").forEach((b) => b.onclick = () => book(b.dataset.id));
      $("grid").querySelectorAll(".cancel").forEach((b) => b.onclick = () => cancel(b.dataset.bid));
      $("grid").querySelectorAll(".detail").forEach((b) => b.onclick = () => detail(b.dataset.id));
    }

    async function book(roomId) {
      const r = await callFn("POST", { body: { action: "book", room_id: Number(roomId), date: curDate } });
      toast(r.error ? r.error : "预定成功");
      loadRooms();
    }
    async function cancel(bid) {
      const r = await callFn("POST", { body: { action: "cancel", booking_id: Number(bid) } });
      toast(r.error ? r.error : "已取消");
      loadRooms();
    }
    async function detail(roomId) {
      const r = await callFn("GET", { query: { action: "detail", room_id: roomId, date: curDate } });
      const b = r.booking;
      $("sheet").innerHTML = `
        <div class="grip"></div>
        <h3><span class="code" style="width:32px;height:32px;font-size:15px">${r.room.code}</span>${r.room.name}</h3>
        <div class="kv"><span class="k">日期</span><span class="v tnum">${r.date}</span></div>
        <div class="kv"><span class="k">状态</span><span class="v"><span class="tag ${b ? "busy" : "free"}">${b ? "已预订" : "空闲"}</span></span></div>
        <div class="kv"><span class="k">预订人</span><span class="v">${b ? (b.booked_by ?? "—") : "—"}</span></div>
        <div class="kv"><span class="k">预定时间</span><span class="v tnum">${b ? new Date(b.booked_at).toLocaleString("zh-CN") : "—"}</span></div>
        <div class="row" style="margin-top:18px">
          ${
            b
              ? (b.is_mine ? `<button class="btn danger" id="d-cancel" style="flex:1">取消预订</button>` : `<button class="btn" disabled style="flex:1">他人已订</button>`)
              : `<button class="btn primary" id="d-book" style="flex:1">预定该会议室</button>`
          }
          <button class="btn ghost" id="d-close" style="flex:1">关闭</button>
        </div>`;
      $("mask").classList.add("show");
      $("d-close").onclick = () => $("mask").classList.remove("show");
      const bk = $("d-book"), cc = $("d-cancel");
      if (bk) bk.onclick = async () => { $("mask").classList.remove("show"); await book(roomId); };
      if (cc) cc.onclick = async () => { $("mask").classList.remove("show"); await cancel(b.id); };
    }

    $("mask").onclick = (e) => { if (e.target.id === "mask") $("mask").classList.remove("show"); };

    // 启动：若 URL 带钉钉回调 code，先换会话再渲染
    async function boot() {
      const code = new URLSearchParams(location.search).get("authCode")
        || new URLSearchParams(location.search).get("code");
      if (code) {
        try {
          const res = await fetch(AUTH_FN_URL, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ code }),
          });
          const d = await res.json();
          if (d.token_hash) {
            await sb.auth.verifyOtp({ type: "magiclink", token_hash: d.token_hash });
          } else {
            toast(d.error || "登录失败");
          }
        } catch (e) { toast("登录异常"); }
        history.replaceState({}, "", location.origin + location.pathname);
      }
      render();
    }
    boot();
  </script>
</body>
</html>
